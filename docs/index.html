
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Serviço indisponível</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --border: #243244;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 720px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: var(--muted);
      font-size: 16px;
    }

    .status-box {
      margin: 28px 0;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
    }

    .status-box strong {
      color: var(--text);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s ease;
    }

    a.primary {
      background: var(--accent);
      color: #00111a;
    }

    a.primary:hover {
      background: var(--accent-hover);
    }

    a.secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: transparent;
    }

    a.secondary:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      main {
        padding: 24px;
        border-radius: 16px;
      }

      .actions {
        flex-direction: column;
      }

      a.button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
 <img src="erro.png">
 
</body>
</html>
